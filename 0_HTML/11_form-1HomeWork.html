<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <filedset>
            <legend>Persion Details</legend>
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Enter your name">
            <br><br>
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password">
            <br><br>
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Enter your email">
            <br><br>
            <label for="gender">Gender</label> <br>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female ">Female</label>
            <input type="radio" id="other" name="gender" value="other">
            <label for="other">Other</label> 
            <br><br>
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Enter your email">
            <br><br>
            <label for="number">Phone Number:</label> <br>
             <input type="text" size="2" maxlength="2" id="countrycode" name="countrycode" placeholder="+91" readonly>  <!-- size se ham input box ka size badha ya ghatta skte he -->
            <input type="number" id="number" name="number" placeholder="6396........">
            <br><br>   

            <input type="submit" value="Submit">
        </filedset>
    </form>
</body>
</html>
