<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <fieldset>
            <legend></legend>
            <label for="">Select your brower </label><br>
            <input type="text" list="browser">
            <datalist id="browser">
                <option >Chrome</option>
                <option >Edge</option>
                <option >FireFox</option>
                <option >Brave</option>
            </datalist> <br><br>
            <label for="">Enter your mobile number no.</label> <br>
            <input type="tel" pattern="[0-9] {10}">
            <br><br>
            <input type="range" min="0" max="100"><br><br>
            <input type="image" src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png" alt="google logo" width="200px" height="100px"> <br><br>
            <!-- disabled and readonly me defernt -->
             <input type="text" value="Hello World" disabled> <br><br>
             <input type="text" value="Hello World" readonly> <br><br>
             <!-- use of textarea -->
            <label for="comments">Additional Comments:</label><br>
            <textarea id="comments" name="comments" rows="4" cols="50" placeholder="Enter your comments here..."></textarea> <br><br>
             <input type="submit"> <br><br>


        </fieldset>
    </form>
  <br>
    <hr>
    <form action="">
        <fieldset>
            <legend>Feedback Form</legend>
            <label for="name">Name:</label><br>
            <input type="text" id="name" name="name" placeholder="Enter your name"><br><br>
            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" placeholder="Enter your email"><br><br>
            <label for="feedback">Your Feedback:</label><br>
            <textarea id="feedback" name="feedback" rows="4" cols="50" placeholder="Enter your feedback here..."></textarea><br><br>
            <label for="rating">Rating our service(1-5):</label><br>
            <input type="number" id="rating" name="rating" min="1" max="5" placeholder="Rate us from 1 to 5"><br><br>
            <label for="date">Date of Visit:</label><br>
            <input type="date" id="date" name="date" min="2023-01-01" max="2023-12-31"  ><br><br>
            <input type="submit" value="Submit Feedback">
        </fieldset>
    </form>
</body>
</html>

datalist -> suggest input values for user
-->
